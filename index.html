<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Booker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none; }
    .tab-active  { border-color: #2563eb; color: #2563eb; }
    .tab-inactive { border-color: transparent; color: #6b7280; }
    .tab-inactive:hover { color: #374151; border-color: #d1d5db; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900 antialiased">

<!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
<header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-20 shadow-sm">
  <div class="flex items-center gap-2.5">
    <svg class="w-6 h-6 text-blue-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
    </svg>
    <span class="text-lg font-semibold tracking-tight">Room Booker</span>
  </div>

  <!-- Role Toggle -->
  <div class="flex items-center gap-3">
    <span class="text-xs text-gray-400 font-medium uppercase tracking-wide hidden sm:block">Role</span>
    <div class="flex bg-gray-100 rounded-lg p-1 gap-1">
      <button id="roleBtn-booker" onclick="setRole('booker')"
        class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">
        Booker
      </button>
      <button id="roleBtn-admin" onclick="setRole('admin')"
        class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">
        Admin
      </button>
    </div>
  </div>
</header>

<!-- ── TAB NAV ────────────────────────────────────────────────────────────── -->
<div class="bg-white border-b border-gray-200 px-6">
  <div class="flex max-w-6xl mx-auto">
    <button id="tabBtn-dashboard" onclick="setTab('dashboard')"
      class="py-3 px-4 text-sm font-medium border-b-2 -mb-px transition-colors">
      Dashboard
    </button>
    <button id="tabBtn-bookings" onclick="setTab('bookings')"
      class="py-3 px-4 text-sm font-medium border-b-2 -mb-px transition-colors">
      Bookings
    </button>
    <button id="tabBtn-manage" onclick="setTab('manage')"
      class="py-3 px-4 text-sm font-medium border-b-2 -mb-px transition-colors hidden">
      Manage Rooms
    </button>
  </div>
</div>

<!-- ── MAIN ───────────────────────────────────────────────────────────────── -->
<main class="max-w-6xl mx-auto px-4 sm:px-6 py-6">

  <!-- ═══════════════════════════ DASHBOARD ══════════════════════════════ -->
  <div id="view-dashboard">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-5">
      <h2 class="text-xl font-semibold">Room Availability</h2>
      <div class="flex items-center gap-2">
        <label class="text-sm text-gray-500">Date</label>
        <input id="dashDate" type="date"
          class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          onchange="renderDashboard()" />
      </div>
    </div>

    <div id="roomGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <div id="noRooms" class="hidden flex flex-col items-center py-20 text-center">
      <svg class="w-12 h-12 text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5"/>
      </svg>
      <p class="text-gray-400 text-sm">No rooms yet.</p>
      <p class="text-gray-400 text-xs mt-1">Switch to Admin → Manage Rooms to add one.</p>
    </div>
  </div>

  <!-- ═══════════════════════════ BOOKINGS ═══════════════════════════════ -->
  <div id="view-bookings" class="hidden">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-5">
      <h2 class="text-xl font-semibold">Bookings</h2>
      <div class="flex items-center gap-2">
        <label class="text-sm text-gray-500">Show</label>
        <select id="bookingFilter" onchange="renderBookingsTab()"
          class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="upcoming">Upcoming</option>
          <option value="all">All</option>
        </select>
        <button onclick="refreshBookings()"
          class="flex items-center gap-1.5 text-sm text-blue-600 hover:text-blue-800 font-medium px-3 py-1.5 rounded-lg hover:bg-blue-50 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          Refresh
        </button>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div id="bookingsList"></div>
    </div>
  </div>

  <!-- ═══════════════════════════ MANAGE ROOMS ═══════════════════════════ -->
  <div id="view-manage" class="hidden">

    <!-- Add Room Card -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 mb-6">
      <h2 class="text-lg font-semibold mb-4">Add a Room</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Room Name <span class="text-red-500">*</span>
          </label>
          <input id="f-name" type="text" placeholder="e.g. Conference Room A"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Capacity</label>
          <input id="f-capacity" type="number" placeholder="e.g. 10" min="1"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
          <input id="f-location" type="text" placeholder="e.g. Floor 2, East Wing"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Amenities</label>
          <input id="f-amenities" type="text" placeholder="e.g. Projector, Whiteboard, TV"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="sm:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea id="f-description" rows="2" placeholder="Optional notes about this room..."
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
        </div>
      </div>

      <div class="mt-4 flex items-center gap-3">
        <button onclick="addRoom()"
          class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors">
          Add Room
        </button>
        <span id="addRoomMsg" class="text-sm"></span>
      </div>
    </div>

    <!-- Rooms List Card -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
        <h2 class="text-lg font-semibold">All Rooms</h2>
        <span id="roomCount" class="text-sm text-gray-400"></span>
      </div>
      <div id="adminRoomList"></div>
    </div>
  </div>

</main>

<!-- ── BOOKING MODAL ───────────────────────────────────────────────────────── -->
<div id="modal"
  class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
  style="background: rgba(0,0,0,0.45); backdrop-filter: blur(2px);"
  onclick="closeModal()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 relative"
    onclick="event.stopPropagation()">

    <!-- Header -->
    <div class="flex items-start justify-between mb-5">
      <div>
        <h3 class="text-lg font-semibold" id="modalRoomName">Book Room</h3>
        <p class="text-sm text-gray-400 mt-0.5" id="modalRoomMeta"></p>
      </div>
      <button onclick="closeModal()"
        class="text-gray-300 hover:text-gray-500 transition-colors ml-3 flex-shrink-0 mt-0.5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Existing bookings for that date -->
    <div id="existingWrap" class="mb-4 hidden">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Already booked on this date</p>
      <div id="existingList" class="space-y-1 bg-amber-50 rounded-lg p-3"></div>
    </div>

    <!-- Form -->
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Your Name <span class="text-red-500">*</span>
        </label>
        <input id="m-name" type="text" placeholder="Full name"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Date <span class="text-red-500">*</span>
        </label>
        <input id="m-date" type="date"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          onchange="updateModalExisting()" />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Start <span class="text-red-500">*</span>
          </label>
          <input id="m-start" type="time"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            End <span class="text-red-500">*</span>
          </label>
          <input id="m-end" type="time"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Purpose</label>
        <input id="m-purpose" type="text" placeholder="e.g. Team meeting, Interview…"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
    </div>

    <p id="modalErr" class="text-red-500 text-sm mt-3 hidden"></p>

    <div class="mt-5 flex gap-3">
      <button id="confirmBtn" onclick="submitBooking()"
        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors">
        Confirm Booking
      </button>
      <button onclick="closeModal()"
        class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-lg text-sm font-medium transition-colors">
        Cancel
      </button>
    </div>
  </div>
</div>

<!-- ── TOAST ───────────────────────────────────────────────────────────────── -->
<div id="toast"
  class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-5 py-3 rounded-full shadow-xl z-50 pointer-events-none transition-all">
</div>

<!-- ── SCRIPT ─────────────────────────────────────────────────────────────── -->
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let role     = 'booker';
let tab      = 'dashboard';
let rooms    = [];
let bookings = [];        // all confirmed bookings
let modalRoom = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(str) {
  // str is YYYY-MM-DD; add T00:00 to avoid timezone shifting
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function apiFetch(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  return { ok: res.ok, status: res.status, data: await res.json() };
}

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), duration);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('dashDate').value = todayStr();
  await Promise.all([loadRooms(), loadBookings()]);
  setRole('booker');   // renders dashboard
}

async function loadRooms() {
  const r = await apiFetch('GET', '/api/rooms');
  if (r.ok) rooms = r.data;
}

async function loadBookings() {
  const r = await apiFetch('GET', '/api/bookings');
  if (r.ok) bookings = r.data;
}

async function refreshBookings() {
  await loadBookings();
  renderBookingsTab();
}

// ── Role ──────────────────────────────────────────────────────────────────────
function setRole(r) {
  role = r;

  const activeClass   = 'bg-white shadow text-blue-600 font-semibold';
  const inactiveClass = 'text-gray-500 hover:text-gray-700';

  document.getElementById('roleBtn-booker').className =
    'px-4 py-1.5 rounded-md text-sm font-medium transition-all ' +
    (role === 'booker' ? activeClass : inactiveClass);
  document.getElementById('roleBtn-admin').className =
    'px-4 py-1.5 rounded-md text-sm font-medium transition-all ' +
    (role === 'admin' ? activeClass : inactiveClass);

  // Show Manage Rooms tab only for admin
  document.getElementById('tabBtn-manage').classList.toggle('hidden', role !== 'admin');

  // If admin was on manage and switches to booker, redirect to dashboard
  if (role === 'booker' && tab === 'manage') {
    setTab('dashboard');
  } else {
    setTab(tab === 'manage' && role !== 'admin' ? 'dashboard' : tab);
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function setTab(t) {
  tab = t;

  const allTabs  = ['dashboard', 'bookings', 'manage'];
  allTabs.forEach(id => {
    const btn  = document.getElementById(`tabBtn-${id}`);
    const view = document.getElementById(`view-${id}`);
    const active = id === t;

    if (btn) {
      btn.className = 'py-3 px-4 text-sm font-medium border-b-2 -mb-px transition-colors ' +
        (active ? 'tab-active' : 'tab-inactive');
    }
    if (view) view.classList.toggle('hidden', !active);
  });

  if (t === 'dashboard') renderDashboard();
  if (t === 'bookings')  renderBookingsTab();
  if (t === 'manage')    renderManageTab();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const date      = document.getElementById('dashDate').value;
  const dayBkgs   = bookings.filter(b => b.date === date);
  const grid      = document.getElementById('roomGrid');
  const noRooms   = document.getElementById('noRooms');

  if (rooms.length === 0) {
    grid.innerHTML = '';
    noRooms.classList.remove('hidden');
    return;
  }
  noRooms.classList.add('hidden');

  grid.innerHTML = rooms.map(room => {
    const rb = dayBkgs
      .filter(b => b.room_id === room.id)
      .sort((a, b) => a.start_time.localeCompare(b.start_time));

    const available = rb.length === 0;

    const statusBadge = available
      ? `<span class="bg-green-50 text-green-700 text-xs px-2 py-0.5 rounded-full font-medium">● Free</span>`
      : `<span class="bg-amber-50 text-amber-700 text-xs px-2 py-0.5 rounded-full font-medium">${rb.length} booked</span>`;

    const amenityTags = (room.amenities || '')
      .split(',')
      .map(a => a.trim())
      .filter(Boolean)
      .map(a => `<span class="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full">${esc(a)}</span>`)
      .join('');

    const bookingRows = rb.map(b => `
      <div class="flex items-baseline gap-2 py-1 border-b border-gray-100 last:border-0 text-xs">
        <span class="font-mono text-gray-400 flex-shrink-0">${esc(b.start_time)}–${esc(b.end_time)}</span>
        <span class="font-medium text-gray-700 truncate">${esc(b.booked_by)}</span>
        ${b.purpose ? `<span class="text-gray-400 truncate">· ${esc(b.purpose)}</span>` : ''}
      </div>`).join('');

    const availSection = available
      ? `<p class="text-xs text-green-600 font-medium mt-2">Free all day on ${fmtDate(date)}</p>`
      : `<div class="mt-3 bg-gray-50 rounded-lg px-3 pt-2 pb-1">
           <p class="text-xs font-medium text-gray-400 mb-1">Bookings on ${fmtDate(date)}</p>
           ${bookingRows}
         </div>`;

    const bookBtn = role === 'booker'
      ? `<div class="px-5 pb-5 pt-1">
           <button onclick='openModal(${JSON.stringify(room)})'
             class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white py-2 rounded-lg text-sm font-medium transition-colors">
             Book This Room
           </button>
         </div>`
      : '';

    return `
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col hover:shadow-md transition-shadow">
        <div class="p-5 flex-1">
          <div class="flex items-start justify-between gap-2 mb-1">
            <h3 class="font-semibold text-gray-900 leading-tight">${esc(room.name)}</h3>
            ${statusBadge}
          </div>
          <div class="flex flex-wrap items-center gap-x-3 gap-y-0.5 text-xs text-gray-400 mb-2">
            ${room.capacity ? `<span>👥 ${esc(String(room.capacity))}</span>` : ''}
            ${room.location ? `<span>📍 ${esc(room.location)}</span>` : ''}
          </div>
          ${room.description ? `<p class="text-xs text-gray-500 mb-2 leading-relaxed">${esc(room.description)}</p>` : ''}
          ${amenityTags ? `<div class="flex flex-wrap gap-1 mb-1">${amenityTags}</div>` : ''}
          ${availSection}
        </div>
        ${bookBtn}
      </div>`;
  }).join('');
}

// ── Bookings Tab ──────────────────────────────────────────────────────────────
function renderBookingsTab() {
  const filter = document.getElementById('bookingFilter').value;
  const today  = todayStr();

  let list = [...bookings];
  if (filter === 'upcoming') {
    list = list.filter(b => b.date >= today);
  }
  list.sort((a, b) => (a.date + a.start_time).localeCompare(b.date + b.start_time));

  const el = document.getElementById('bookingsList');

  if (list.length === 0) {
    el.innerHTML = `
      <div class="flex flex-col items-center py-14 text-center">
        <svg class="w-10 h-10 text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <p class="text-gray-400 text-sm">${filter === 'upcoming' ? 'No upcoming bookings.' : 'No bookings found.'}</p>
      </div>`;
    return;
  }

  // Group by date
  const byDate = {};
  list.forEach(b => {
    if (!byDate[b.date]) byDate[b.date] = [];
    byDate[b.date].push(b);
  });

  el.innerHTML = Object.entries(byDate).map(([date, bkgs]) => {
    const rows = bkgs.map(b => `
      <div class="flex items-center px-6 py-3.5 border-b border-gray-50 last:border-0 hover:bg-gray-50 group">
        <div class="w-32 flex-shrink-0">
          <p class="text-xs font-mono text-gray-500">${esc(b.start_time)} – ${esc(b.end_time)}</p>
        </div>
        <div class="flex-1 min-w-0 mx-3">
          <p class="text-sm font-medium text-gray-900 truncate">${esc(b.room_name)}</p>
          <p class="text-xs text-gray-400 truncate">
            ${esc(b.booked_by)}${b.purpose ? ' · ' + esc(b.purpose) : ''}
          </p>
        </div>
        <button onclick="cancelBooking(${b.id})"
          class="ml-2 flex-shrink-0 text-xs font-medium text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-all px-2 py-1 rounded hover:bg-red-50">
          Cancel
        </button>
      </div>`).join('');

    const isToday   = date === today;
    const isFuture  = date > today;

    return `
      <div class="border-b border-gray-100 last:border-0">
        <div class="px-6 py-2 bg-gray-50 flex items-center gap-2">
          <span class="text-xs font-semibold text-gray-600">${fmtDate(date)}</span>
          ${isToday  ? '<span class="text-xs bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded font-medium">Today</span>' : ''}
          ${!isToday && !isFuture ? '<span class="text-xs text-gray-400">Past</span>' : ''}
        </div>
        ${rows}
      </div>`;
  }).join('');
}

async function cancelBooking(id) {
  if (!confirm('Cancel this booking?')) return;
  const r = await apiFetch('PATCH', `/api/bookings/${id}/cancel`);
  if (r.ok) {
    bookings = bookings.filter(b => b.id !== id);
    renderBookingsTab();
    renderDashboard();
    showToast('Booking cancelled.');
  } else {
    alert('Could not cancel booking.');
  }
}

// ── Manage Rooms ──────────────────────────────────────────────────────────────
function renderManageTab() {
  const count = document.getElementById('roomCount');
  count.textContent = `${rooms.length} room${rooms.length !== 1 ? 's' : ''}`;

  const el = document.getElementById('adminRoomList');
  if (rooms.length === 0) {
    el.innerHTML = '<p class="text-sm text-gray-400 text-center py-10">No rooms added yet.</p>';
    return;
  }

  el.innerHTML = rooms.map(room => `
    <div class="flex items-center px-6 py-4 border-b border-gray-50 last:border-0 hover:bg-gray-50 group">
      <div class="flex-1 min-w-0">
        <p class="font-medium text-gray-900">${esc(room.name)}</p>
        <p class="text-xs text-gray-400 mt-0.5 truncate">
          ${[
            room.capacity ? `${room.capacity} people` : null,
            room.location || null,
            room.amenities || null
          ].filter(Boolean).join(' · ')}
        </p>
        ${room.description ? `<p class="text-xs text-gray-500 mt-0.5 truncate">${esc(room.description)}</p>` : ''}
      </div>
      <button onclick="deleteRoom(${room.id}, ${JSON.stringify(room.name)})"
        class="ml-4 flex-shrink-0 text-xs font-medium text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-all px-2 py-1 rounded hover:bg-red-50">
        Delete
      </button>
    </div>`).join('');
}

async function addRoom() {
  const name        = document.getElementById('f-name').value.trim();
  const capacity    = document.getElementById('f-capacity').value;
  const location    = document.getElementById('f-location').value.trim();
  const description = document.getElementById('f-description').value.trim();
  const amenities   = document.getElementById('f-amenities').value.trim();
  const msg         = document.getElementById('addRoomMsg');

  if (!name) {
    showFieldMsg(msg, 'Room name is required.', 'red');
    document.getElementById('f-name').focus();
    return;
  }

  const r = await apiFetch('POST', '/api/rooms', {
    name,
    capacity: capacity ? parseInt(capacity, 10) : null,
    location,
    description,
    amenities
  });

  if (r.ok) {
    rooms.push(r.data);
    ['f-name', 'f-capacity', 'f-location', 'f-description', 'f-amenities']
      .forEach(id => document.getElementById(id).value = '');
    showFieldMsg(msg, `✓ "${r.data.name}" added.`, 'green');
    renderManageTab();
  } else {
    showFieldMsg(msg, r.data.error || 'Error adding room.', 'red');
  }
}

async function deleteRoom(id, name) {
  if (!confirm(`Delete "${name}"?\n\nThis will also cancel all its bookings.`)) return;
  const r = await apiFetch('DELETE', `/api/rooms/${id}`);
  if (r.ok) {
    rooms    = rooms.filter(rm => rm.id !== id);
    bookings = bookings.filter(b => b.room_id !== id);
    renderManageTab();
    showToast(`"${name}" deleted.`);
  } else {
    alert('Could not delete room.');
  }
}

function showFieldMsg(el, msg, color) {
  el.textContent = msg;
  el.className = `text-sm text-${color}-600`;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.textContent = ''; }, 4000);
}

// ── Booking Modal ─────────────────────────────────────────────────────────────
function openModal(room) {
  modalRoom = room;
  document.getElementById('modalRoomName').textContent = room.name;
  document.getElementById('modalRoomMeta').textContent = [
    room.capacity ? `${room.capacity} people` : null,
    room.location || null
  ].filter(Boolean).join(' · ');

  // Pre-fill date from dashboard
  const dashDate = document.getElementById('dashDate').value;
  document.getElementById('m-date').value    = dashDate || todayStr();
  document.getElementById('m-start').value   = '';
  document.getElementById('m-end').value     = '';
  document.getElementById('m-purpose').value = '';

  // Restore last used name
  document.getElementById('m-name').value = localStorage.getItem('rb_name') || '';

  document.getElementById('modalErr').classList.add('hidden');
  updateModalExisting();

  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('m-name').focus();
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  modalRoom = null;
}

function updateModalExisting() {
  if (!modalRoom) return;
  const date = document.getElementById('m-date').value;
  const wrap = document.getElementById('existingWrap');
  const list = document.getElementById('existingList');

  const existing = bookings
    .filter(b => b.room_id === modalRoom.id && b.date === date)
    .sort((a, b) => a.start_time.localeCompare(b.start_time));

  if (existing.length === 0) {
    wrap.classList.add('hidden');
    return;
  }

  wrap.classList.remove('hidden');
  list.innerHTML = existing.map(b => `
    <div class="flex items-center gap-2 text-xs py-0.5">
      <span class="font-mono text-amber-700 font-medium">${esc(b.start_time)}–${esc(b.end_time)}</span>
      <span class="text-gray-600">${esc(b.booked_by)}${b.purpose ? ' · ' + esc(b.purpose) : ''}</span>
    </div>`).join('');
}

async function submitBooking() {
  const room    = modalRoom;  // capture before any async
  const name    = document.getElementById('m-name').value.trim();
  const date    = document.getElementById('m-date').value;
  const start   = document.getElementById('m-start').value;
  const end     = document.getElementById('m-end').value;
  const purpose = document.getElementById('m-purpose').value.trim();

  if (!name)  return showModalErr('Please enter your name.');
  if (!date)  return showModalErr('Please select a date.');
  if (!start) return showModalErr('Please select a start time.');
  if (!end)   return showModalErr('Please select an end time.');
  if (start >= end) return showModalErr('End time must be after start time.');

  document.getElementById('modalErr').classList.add('hidden');
  document.getElementById('confirmBtn').disabled = true;
  document.getElementById('confirmBtn').textContent = 'Booking…';

  const r = await apiFetch('POST', '/api/bookings', {
    room_id: room.id, booked_by: name, date, start_time: start, end_time: end, purpose
  });

  document.getElementById('confirmBtn').disabled = false;
  document.getElementById('confirmBtn').textContent = 'Confirm Booking';

  if (r.ok) {
    localStorage.setItem('rb_name', name);
    bookings.push(r.data);
    closeModal();
    renderDashboard();
    showToast(`✓ Booked ${room.name} for ${fmtDate(date)}, ${start}–${end}`);
  } else {
    showModalErr(r.data.error || 'Could not create booking.');
  }
}

function showModalErr(msg) {
  const el = document.getElementById('modalErr');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
